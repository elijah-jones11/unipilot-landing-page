<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniPilot</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f8ff;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 40px 24px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 16px;
    }

    p {
      font-size: 18px;
      color: #4b5563;
      line-height: 1.5;
      margin-bottom: 28px;
    }

    form {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    input {
      padding: 14px 16px;
      font-size: 16px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      min-width: 260px;
    }

    button {
      padding: 14px 20px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #4f46e5;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #4338ca;
    }

    .small {
      margin-top: 18px;
      font-size: 14px;
      color: #6b7280;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>UniPilot</h1>

    <p>
      Plan your degree, check prerequisites, map exchange options,
      and build a smarter path through university.
    </p>

    <form action="https://formly.pro/f/SvaEDzNGojmcnbTQeBIh" method="POST">
      <input type="email" name="email" placeholder="Enter your email" required>
      <button type="submit">Join waitlist</button>
    </form>

    <div class="small">
      Launching soon for USYD students.
    </div>
  </div>
</body>
</html>
